name: 🤖 AI Trader — Coinbase

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Permessi per fare git push del log delle operazioni
permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Installa dipendenze
        run: pip install -r requirements.txt

      - name: 🔍 Verifica secrets configurati
        run: |
          if [ -z "${{ secrets.COINBASE_API_KEY }}" ]; then
            echo "❌ COINBASE_API_KEY non configurata!"
            exit 1
          fi
          if [ -z "${{ secrets.COINBASE_API_SECRET }}" ]; then
            echo "❌ COINBASE_API_SECRET non configurata!"
            exit 1
          fi
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ANTHROPIC_API_KEY non configurata!"
            exit 1
          fi
          echo "✅ Tutti i secrets presenti"

      - name: 🤖 Esegui ciclo AI Trader
        env:
          COINBASE_API_KEY:    ${{ secrets.COINBASE_API_KEY }}
          COINBASE_API_SECRET: ${{ secrets.COINBASE_API_SECRET }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:             ${{ secrets.DRY_RUN }}
          RISK_PROFILE:        ${{ secrets.RISK_PROFILE }}
        run: python trader.py
